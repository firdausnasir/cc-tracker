<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App icon: a single card, the product's core object. Warm tangerine brand
       ground (matches the primary token), full-bleed so it renders cleanly as
       a maskable icon. One white card, one chip, two ledger bars. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A4C"/>
      <stop offset="1" stop-color="#E64F1B"/>
    </linearGradient>
    <linearGradient id="card" x1="118" y1="150" x2="394" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF1E6"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed brand background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Card, slightly tilted, kept within the maskable safe zone -->
  <g transform="rotate(-7 256 256)">
    <!-- soft drop shadow -->
    <rect x="126" y="172" width="264" height="172" rx="26" fill="#7A2A09" opacity="0.26"/>
    <rect x="118" y="162" width="276" height="180" rx="28" fill="url(#card)"/>

    <!-- chip, in brand tangerine -->
    <rect x="150" y="200" width="50" height="40" rx="9" fill="#F2682F"/>

    <!-- ledger bars (balance lines), warm tints -->
    <rect x="150" y="270" width="150" height="16" rx="8" fill="#F2682F" opacity="0.85"/>
    <rect x="150" y="300" width="96" height="14" rx="7" fill="#F2A073" opacity="0.8"/>
  </g>
</svg>
