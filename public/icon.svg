<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App icon: a credit card, the product's core object. Brand indigo-violet
       primary color, full-bleed so it renders cleanly as a maskable icon.
       No typography: chip, contactless waves, and abstract number bars stand
       in for card detail. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6B4BF0"/>
      <stop offset="1" stop-color="#3D1FB0"/>
    </linearGradient>
    <linearGradient id="card" x1="118" y1="150" x2="394" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECE7FB"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD680"/>
      <stop offset="1" stop-color="#E0A93B"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed brand background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Card, slightly tilted, kept within the maskable safe zone -->
  <g transform="rotate(-8 256 256)">
    <!-- soft drop shadow -->
    <rect x="124" y="170" width="264" height="172" rx="22" fill="#1A0B5E" opacity="0.28"/>
    <rect x="118" y="160" width="276" height="180" rx="24" fill="url(#card)"/>

    <!-- EMV chip -->
    <g transform="translate(150 198)">
      <rect width="48" height="38" rx="7" fill="url(#chip)"/>
      <path d="M0 19 H48 M16 0 V38 M32 0 V38" stroke="#9C6F1E" stroke-width="2.5" opacity="0.55"/>
    </g>

    <!-- contactless waves -->
    <g transform="translate(214 200)" stroke="#7C5CF2" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M0 6 A14 14 0 0 1 0 28"/>
      <path d="M10 0 A24 24 0 0 1 10 34"/>
    </g>

    <!-- abstract number groups (bars, not glyphs) -->
    <g fill="#5B3FD6" opacity="0.85">
      <rect x="150" y="270" width="46" height="12" rx="6"/>
      <rect x="206" y="270" width="46" height="12" rx="6"/>
      <rect x="262" y="270" width="46" height="12" rx="6"/>
      <rect x="318" y="270" width="38" height="12" rx="6"/>
    </g>
    <!-- cardholder line -->
    <rect x="150" y="298" width="120" height="10" rx="5" fill="#A593E8" opacity="0.8"/>
  </g>
</svg>
